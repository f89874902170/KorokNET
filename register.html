<!DOCTYPE html>
<html lang="ru">
<!-- Страница регистрации - реализованны проверки на типы данных и уникальность логина, а так же переход на авторизацию -->
<!-- Везде реализована адаптация текста под мобильную версию -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-card {
            border-radius: 10px;
            min-height: 300px;
        }

        .card-body {
            padding-bottom: 50px !important;
        }

        .table thead th {
            text-transform: uppercase;
            font-size: 0.85rem;
        }


        @media (min-resolution: 1.5dppx) {
            html {
                font-size: 80%;
                /* Уменьшаем на 20% сразу при зуме */
            }
        }

        @media (min-resolution: 2.5dppx) {
            html {
                font-size: 50%;
            }
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Портал «Корочки.есть»</a>
            <div class="d-flex">
                <!-- Кнопка Выход -->
                <a href="index.html" class="btn btn-outline-light btn-sm">Выйти</a>
            </div>
        </div>
    </nav>
    <div class="card p-4 shadow">
        <meta charset="UTF-8">
        <h2 class="text-center mb-4">Регистрация</h2>
        <form>
            <div class="mb-3">
                <label class="form-label">Логин (мин. 6 символов)</label>
                <input type="text" class="form-control" minlength="6" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль (мин. 8 символов)</label>
                <input type="password" class="form-control" minlength="8" required>
            </div>
            <div class="mb-3">
                <label class="form-label">ФИО</label>
                <input type="text" class="form-control" pattern="[А-Яа-яЁё\s]+" required
                    placeholder="Иванов Иван Иванович">
            </div>
            <div class="mb-3">
                <label class="form-label">Телефон</label>
                <input type="tel" class="form-control" placeholder="8(XXX)XXX-XX-XX" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
        </form>
    </div>
    <script>
        // Массив логинов, которые уже заняты (для примера)
        const takenLogins = ['user123', 'admin', 'student2024'];

        document.querySelector('form').addEventListener('submit', function (e) {
            // Находим поле логина
            const loginInput = document.querySelector('input[type="text"]');
            const loginValue = loginInput.value.toLowerCase();

            // Проверяем, есть ли такой логин в массиве
            if (takenLogins.includes(loginValue)) {
                e.preventDefault(); // Останавливаем отправку формы
                alert('Ошибка: Логин "' + loginValue + '" уже занят. Попробуйте другой.');
                loginInput.focus(); // Ставим курсор обратно в поле
            } else {
                alert('Регистрация прошла успешно!');
                // Здесь можно перенаправить на страницу логина
                window.location.href = 'login.html';
            }
        });
    </script>
</body>

</html>
