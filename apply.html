<!DOCTYPE html>
<html lang="ru">
<!-- Страница подачи заявки - реализованно заполнение данных по ТЗ, выход назад в просмотр заявок -->
<!-- Везде реализована адаптация текста под мобильную версию -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подача заявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @media (min-resolution: 1.5dppx) {
            html {
                font-size: 80%;
                /* Уменьшаем на 20% сразу при зуме */
            }
        }

        @media (min-resolution: 2.5dppx) {
            html {
                font-size: 50%;
            }
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Портал «Корочки.есть»</a>
            <div class="d-flex">
                <!-- Кнопка Выход -->
                <a href="view_applications.html" class="btn btn-outline-light btn-sm">Назад</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <meta charset="UTF-8">
        <h2>Оформление заявки</h2>
        <form class="mt-4">
            <div class="mb-3">
                <label class="form-label">Наименование курса</label>
                <input type="text" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Дата начала обучения</label>
                <input type="date" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Способ оплаты</label>
                <select class="form-select">
                    <option value="cash">Наличными</option>
                    <option value="phone">Перевод по номеру телефона</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Отправить</button>
        </form>
    </div>
        <footer class="bg-dark text-white text-center py-3 mt-auto">
    <div class="container">
        <p class="mb-0">
            &copy; 2026 Шварева Екатерина
        </p>
    </div>
</footer>
</body>

</html>
