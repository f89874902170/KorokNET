<!DOCTYPE html>
<html lang="ru">
<!-- Страница администратора - реализованн выпадающий список для "измененения" статуса заявки, список заявок -->
<!-- Везде реализована адаптация текста под мобильную версию -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .admin-card {
            border-radius: 10px;
            min-height: 300px;
        }

        .card-body {
            padding-bottom: 50px !important;
        }

        .table thead th {
            text-transform: uppercase;
            font-size: 0.85rem;
        }


        @media (min-resolution: 1.5dppx) {
            html {
                font-size: 80%;
                /* Уменьшаем на 20% сразу при зуме */
            }
        }

        @media (min-resolution: 2.5dppx) {
            html {
                font-size: 50%;
            }
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Портал «Корочки.есть»</a>
            <div class="d-flex">
                <!-- Кнопка Выход -->
                <a href="index.html" class="btn btn-outline-light btn-sm">Выйти</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2 class="mb-4">Панель администратора</h2>

        <!-- Оборачиваем таблицу в карточку для единообразия с другими страницами -->
        <div class="table-responsive">
            <div class="card admin-card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Пользователь</th>
                                <th>Курс</th>
                                <th>Статус</th>
                                <th>Действие</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>Иван Иванов</td>
                                <td>Python Basic</td>
                                <td><span class="badge bg-info text-dark">Новая</span></td>
                                <td>
                                    <div class="btn-group">
                                        <button type="button" class="btn btn-sm btn-outline-primary dropdown-toggle"
                                            data-bs-toggle="dropdown" aria-expanded="false">
                                            Изменить статус
                                        </button>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" href="#">Новая</a></li>
                                            <li><a class="dropdown-item" href="#">Идет обучение</a></li>
                                            <li><a class="dropdown-item" href="#">Обучение завершено</a></li>
                                        </ul>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>Серафима Серафимовна</td>
                                <td>C# Basic</td>
                                <td><span class="badge bg-info text-dark">Новая</span></td>
                                <td>
                                    <div class="btn-group">
                                        <button type="button" class="btn btn-sm btn-outline-primary dropdown-toggle"
                                            data-bs-toggle="dropdown" aria-expanded="false">
                                            Изменить статус
                                        </button>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" href="#">Новая</a></li>
                                            <li><a class="dropdown-item" href="#">Идет обучение</a></li>
                                            <li><a class="dropdown-item" href="#">Обучение завершено</a></li>
                                        </ul>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <footer class="bg-dark text-white text-center py-3 mt-auto">
    <div class="container">
        <p class="mb-0">
            &copy; 2026 Шварева Екатерина
        </p>
    </div>
</footer>

</html>
