<!DOCTYPE html>
<html lang="ru">
<!-- Страница авторизации - до пройденной авторизации пользователь порталом не пользуется, проверка на пользователя и админа, так же реализован переход на регистрацию -->
<!-- Везде реализована адаптация текста под мобильную версию -->

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        @media (max-width: 576px) {
            .card {
                width: 210% !important;
                /* На телефоне растягиваем на весь экран */
                margin: 0 auto;
            }
        }
    </style>
    </style>
    <title>Авторизация</title>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Портал «Корочки.есть»</a>
        </div>
    </nav>

    <!-- Оставляем только один контейнер для центрирования -->
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="card p-4 shadow" style="width: 400px; max-width: 100%;">
            <h2 class="text-center mb-4">Авторизация</h2>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input type="text" id="login" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
            <div class="mt-3 text-center">
                <a href="register.html">Еще не зарегистрированы? Регистрация</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const login = document.getElementById('login').value;
            const pass = document.getElementById('password').value;

            // Проверка данных из задания
            if (login === 'user123' && pass === '123456') {
                window.location.href = 'view_applications.html';
            } else if (login === 'Admin' && pass === 'KorokNET') {
                window.location.href = 'admin.html';
            }
            else {
                alert('Неверный логин или пароль!');
            }
        });
    </script>
   <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 Шварева Екатерина</p>
        </div>
    </footer>
</body>

</html>
